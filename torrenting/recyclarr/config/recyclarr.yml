#
#### commands  issue this to get the below....
#213f988b324d:/$ recyclarr list custom-formats sonarr
#
# Instance Definition: https://recyclarr.dev/wiki/yaml/config-reference/basic/
sonarr:
  tvHD:
    base_url: !secret sonarr_url
    api_key: !secret sonarr_apikey
    # Custom Format Configuration
    delete_old_custom_formats: true
    #replace_existing_custom_formats: true
    # Quality Profile Configuration
    quality_profiles:
      - name: HD - 720p/1080p
        reset_unmatched_scores:
          enabled: true
          except:
            - Descriptive Audio
          #   - My Second CF
        upgrade:
          allowed: true
          until_quality: Bluray-1080p
          until_score: 30000
        min_format_score: 0
        # score_set: HDTV-720p
        # quality_sort: bottom
        qualities:
          - name: Bluray-2160p Remux
            enabled: false
          - name: Bluray-2160p
            enabled: false
          # - name: WEB 2160p
          #   enabled: false
          - name: HDTV-2160p
            enabled: false
          - name: Bluray-1080p Remux
            enabled: false
          - name: Bluray-1080p
          - name: WEB 1080p
            #enabled: false
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          - name: Bluray-720p
          - name: WEB 720p
            qualities:
              - WEBRip-720p
              - WEBDL-720p
          - name: Raw-HD
          - name: HDTV-1080p
          - name: HDTV-720p
          - name: Bluray-576p
            enabled: false
          - name: Bluray-480p
            enabled: false
          - name: DVD
            enabled: false
          # - name: WEB 480p
          #   enabled: false
          - name: SDTV
            enabled: false
          - name: Unknown
            enabled: false
    quality_definition:
      type: series
    custom_formats:
      # Advanced Audio from the guide
      - trash_ids:
          # Audio Advanced #1
          - b6fbafa7942952a13e17e2b1152b539a # ATMOS (undefined)
          - 63487786a8b01b7f20dd2bc90dd4a477 # DD+
          - 4232a509ce60c4e208d13825b7c06264 # DD+ ATMOS
          - 5964f2a8b3be407d083498e4459d05d0 # DTS
