            -  BR-DISK - Quality
          #   - My First CF
          #   - My Second CF
        upgrade:
          allowed: true
          #until_quality: Remux-1080p
          #until_quality:  WEB 1080p
          until_quality: Bluray-1080p
          until_score: 30000
        min_format_score: 0
