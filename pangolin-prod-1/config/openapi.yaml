          name: orgId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                niceId:
                  type: string
                mode:
                  type: string
                  enum:
                    - host
                    - cidr
                    - http
                    - ssh
                ssl:
                  type: boolean
                scheme:
                  type: string
                  enum:
                    - http
                    - https
                siteIds:
                  type: array
                  items:
                    type: integer
                siteId:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                destinationPort:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                destination:
                  type: string
                  minLength: 1
                enabled:
                  type: boolean
                  default: true
                alias:
                  type: string
                  pattern: >-
                    ^(?:[a-zA-Z0-9*?](?:[a-zA-Z0-9*?-]{0,61}[a-zA-Z0-9*?])?\.)+[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?$
                  description: >-
                    Fully qualified domain name with optional wildcards, e.g.,
                    example.internal, *.example.internal, or
                    host-0?.example.internal
                  example: service.example.internal
                userIds:
                  type: array
                  items:
                    type: string
                roleIds:
                  type: array
                  items:
                    type: integer
                clientIds:
                  type: array
                  items:
                    type: integer
                tcpPortRangeString:
                  type: string
                  description: >-
                    Port range string. Use "*" for all ports, a comma-separated
                    list of ports, or ranges (e.g., "80,443,8000-9000"). Ports
                    must be between 1 and 65535.
                  example: 80,443,8000-9000
                udpPortRangeString:
                  type: string
                  description: >-
                    Port range string. Use "*" for all ports, a comma-separated
                    list of ports, or ranges (e.g., "80,443,8000-9000"). Ports
                    must be between 1 and 65535.
                  example: 80,443,8000-9000
                disableIcmp:
                  type: boolean
                authDaemonPort:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                authDaemonMode:
                  type: string
                  enum:
                    - site
                    - remote
                    - native
                pamMode:
                  type: string
                  enum:
                    - passthrough
                    - push
                domainId:
                  type: string
                subdomain:
                  type: string
              required:
                - name
                - mode
                - userIds
                - roleIds
                - clientIds
              additionalProperties: false
