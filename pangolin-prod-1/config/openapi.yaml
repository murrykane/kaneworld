      tags:
        - Organization
        - Policy
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: true
          name: orgId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                sso:
                  type: boolean
                  default: true
                skipToIdpId:
                  type: integer
                roleIds:
                  type: array
                  items:
                    type: string
                  default: []
                userIds:
                  type: array
                  items:
                    type: string
                  default: []
                password:
                  type: string
                  nullable: true
                  minLength: 4
                  maxLength: 100
                pincode:
                  anyOf:
                    - type: string
                      pattern: ^\d{6}$
                    - nullable: true
                headerAuth:
                  type: object
                  nullable: true
                  properties:
                    user:
                      type: string
                      minLength: 4
                      maxLength: 100
                    password:
                      type: string
                      minLength: 4
                      maxLength: 100
                    extendedCompatibility:
                      type: boolean
                  required:
                    - user
                    - password
                    - extendedCompatibility
                emailWhitelistEnabled:
                  type: boolean
                  default: false
                emails:
                  type: array
                  items:
                    anyOf:
                      - type: string
                        format: email
                      - type: string
                        pattern: ^\*@[\w.-]+\.[a-zA-Z]{2,}$
                  maxItems: 50
                  default: []
                applyRules:
                  type: boolean
                  default: false
                rules:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                        enum:
                          - ACCEPT
                          - DROP
                          - PASS
                        description: rule action
                      match:
                        type: string
                        enum:
                          - CIDR
                          - IP
                          - PATH
                          - COUNTRY
                          - ASN
                          - REGION
                        description: rule match
                      value:
                        type: string
                        minLength: 1
                      priority:
                        type: integer
                        description: Rule priority
                      enabled:
                        type: boolean
                    required:
                      - action
                      - match
                      - value
                      - priority
                    additionalProperties: false
                  default: []
              required:
                - name
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
