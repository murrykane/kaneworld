openapi: 3.0.0
info:
  version: v1
  title: Pangolin Integration API
servers:
  - url: /v1
components:
  securitySchemes:
    Bearer Auth:
      type: http
      scheme: bearer
  schemas: {}
  parameters: {}
paths:
  /org/{orgId}/certificate/{domainId}/{domain}:
    get:
      description: Get a certificate by domain.
      tags:
        - Certificate
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: true
          name: domainId
          in: path
        - schema:
            type: string
            minLength: 1
            maxLength: 255
          required: true
          name: domain
          in: path
        - schema:
            type: string
          required: true
          name: orgId
          in: path
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /certificate/{certId}:
    post:
      description: Restart a certificate by ID.
      tags:
        - Certificate
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: true
          name: certId
          in: path
        - schema:
            type: string
          required: true
          name: orgId
          in: path
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/role:
    put:
      description: Create a role.
      tags:
        - Role
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: true
          name: orgId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                requireDeviceApproval:
                  type: boolean
                allowSsh:
                  type: boolean
                sshSudoMode:
                  type: string
                  enum:
                    - none
                    - full
                    - commands
                sshSudoCommands:
                  type: array
                  items:
                    type: string
                sshCreateHomeDir:
                  type: boolean
                sshUnixGroups:
                  type: array
                  items:
                    type: string
              required:
                - name
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /target/{targetId}:
    get:
      description: Get a target.
      tags:
        - Resource Target
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: true
          name: targetId
          in: path
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
    delete:
      description: Delete a target.
      tags:
        - Resource Target
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: true
          name: targetId
          in: path
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
    post:
      description: Update a target.
      tags:
        - Resource Target
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: true
          name: targetId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                siteId:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                ip:
                  type: string
                mode:
                  type: string
                  nullable: true
                  enum:
                    - http
                    - tcp
                    - udp
                    - ssh
                    - rdp
                    - vnc
                    - null
                method:
                  type: string
                  nullable: true
                  minLength: 1
                  maxLength: 10
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                enabled:
                  type: boolean
                hcEnabled:
                  type: boolean
                  nullable: true
                hcPath:
                  type: string
                  nullable: true
                  minLength: 1
                hcScheme:
                  type: string
                  nullable: true
                hcMode:
                  type: string
                  nullable: true
                hcHostname:
                  type: string
                  nullable: true
                hcPort:
                  type: integer
                  nullable: true
                  minimum: 0
                  exclusiveMinimum: true
                hcInterval:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcUnhealthyInterval:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcTimeout:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcHeaders:
                  type: array
                  nullable: true
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                    required:
                      - name
                      - value
                    additionalProperties: false
                hcFollowRedirects:
                  type: boolean
                  nullable: true
                hcMethod:
                  type: string
                  nullable: true
                  minLength: 1
                hcStatus:
                  type: integer
                  nullable: true
                hcTlsServerName:
                  type: string
                  nullable: true
                hcHealthyThreshold:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcUnhealthyThreshold:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                path:
                  type: string
                  nullable: true
                pathMatchType:
                  type: string
                  nullable: true
                  enum:
                    - exact
                    - prefix
                    - regex
                    - null
                rewritePath:
                  type: string
                  nullable: true
                rewritePathType:
                  type: string
                  nullable: true
                  enum:
                    - exact
                    - prefix
                    - regex
                    - stripPrefix
                    - null
                priority:
                  type: integer
                  minimum: 1
                  maximum: 1000
              required:
                - siteId
                - ip
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /resource/{resourceId}/target:
    put:
      description: Create a target for a resource.
      tags:
        - Public Resource
        - Resource Target
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: true
          name: resourceId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                siteId:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                ip:
                  type: string
                mode:
                  type: string
                  enum:
                    - http
                    - tcp
                    - udp
                    - ssh
                    - rdp
                    - vnc
                method:
                  type: string
                  nullable: true
                port:
                  type: integer
                  minimum: 1
                  maximum: 65535
                enabled:
                  type: boolean
                  default: true
                hcEnabled:
                  type: boolean
                hcPath:
                  type: string
                  nullable: true
                  minLength: 1
                hcScheme:
                  type: string
                  nullable: true
                hcMode:
                  type: string
                  nullable: true
                hcHostname:
                  type: string
                  nullable: true
                hcPort:
                  type: integer
                  nullable: true
                  minimum: 0
                  exclusiveMinimum: true
                hcInterval:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcUnhealthyInterval:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcTimeout:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcHeaders:
                  type: array
                  nullable: true
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                    required:
                      - name
                      - value
                    additionalProperties: false
                hcFollowRedirects:
                  type: boolean
                  nullable: true
                hcMethod:
                  type: string
                  nullable: true
                  minLength: 1
                hcStatus:
                  type: integer
                  nullable: true
                hcTlsServerName:
                  type: string
                  nullable: true
                hcHealthyThreshold:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                hcUnhealthyThreshold:
                  type: integer
                  nullable: true
                  minimum: 1
                  exclusiveMinimum: true
                path:
                  type: string
                  nullable: true
                pathMatchType:
                  type: string
                  nullable: true
                  enum:
                    - exact
                    - prefix
                    - regex
                    - null
                rewritePath:
                  type: string
                  nullable: true
                rewritePathType:
                  type: string
                  nullable: true
                  enum:
                    - exact
                    - prefix
                    - regex
                    - stripPrefix
                    - null
                priority:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 1000
              required:
                - siteId
                - ip
                - port
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /resource/{resourceId}/targets:
    get:
      description: List targets for a resource.
      tags:
        - Public Resource
        - Resource Target
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: integer
            minimum: 0
            exclusiveMinimum: true
          required: true
          name: resourceId
          in: path
        - schema:
            type: string
            default: '1000'
          required: false
          name: limit
          in: query
        - schema:
            type: string
            default: '0'
          required: false
          name: offset
          in: query
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/idp/oidc:
    put:
      description: Create an OIDC IdP for a specific organization.
      tags:
        - Identity Provider (Organization Only)
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: orgId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                clientId:
                  type: string
                  minLength: 1
                clientSecret:
                  type: string
                  minLength: 1
                authUrl:
                  type: string
                  format: uri
                tokenUrl:
                  type: string
                  format: uri
                identifierPath:
                  type: string
                  minLength: 1
                emailPath:
                  type: string
                namePath:
                  type: string
                scopes:
                  type: string
                  minLength: 1
                autoProvision:
                  type: boolean
                variant:
                  type: string
                  enum:
                    - oidc
                    - google
                    - azure
                  default: oidc
                roleMapping:
                  type: string
                orgMapping:
                  type: string
                  nullable: true
                tags:
                  type: string
              required:
                - name
                - clientId
                - clientSecret
                - authUrl
                - tokenUrl
                - identifierPath
                - scopes
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/idp/{idpId}:
    get:
      description: Get an IDP by its IDP ID for a specific organization.
      tags:
        - Identity Provider (Organization Only)
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: orgId
          in: path
        - schema:
            type: number
            nullable: true
          required: false
          name: idpId
          in: path
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
    delete:
      description: Delete IDP for a specific organization.
      tags:
        - Identity Provider (Organization Only)
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: false
          name: orgId
          in: path
        - schema:
            type: number
            nullable: true
          required: false
          name: idpId
          in: path
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/idp:
    get:
      description: List all IDP for a specific organization.
      tags:
        - Identity Provider (Organization Only)
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: orgId
          in: path
        - schema:
            type: string
            default: '1000'
          required: false
          name: limit
          in: query
        - schema:
            type: string
            default: '0'
          required: false
          name: offset
          in: query
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/idp/{idpId}/oidc:
    post:
      description: Update an OIDC IdP for a specific organization.
      tags:
        - Identity Provider (Organization Only)
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
            minLength: 1
          required: true
          name: orgId
          in: path
        - schema:
            type: number
            nullable: true
          required: false
          name: idpId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                clientId:
                  type: string
                clientSecret:
                  type: string
                authUrl:
                  type: string
                tokenUrl:
                  type: string
                identifierPath:
                  type: string
                emailPath:
                  type: string
                namePath:
                  type: string
                scopes:
                  type: string
                autoProvision:
                  type: boolean
                roleMapping:
                  type: string
                orgMapping:
                  type: string
                  nullable: true
                tags:
                  type: string
              additionalProperties: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    properties:
                      idpId:
                        type: number
                    required:
                      - idpId
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /domain/check-namespace-availability:
    get:
      description: Check if a domain namespace is available based on subdomain
      tags:
        - Domain
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: true
          name: subdomain
          in: query
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /domains/namepaces:
    get:
      description: List all domain namespaces in the system
      tags:
        - Domain
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
            default: '1000'
          required: false
          name: limit
          in: query
        - schema:
            type: string
            default: '0'
          required: false
          name: offset
          in: query
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    properties:
                      domainNamespaces:
                        type: array
                        items:
                          type: object
                          properties:
                            domainNamespaceId:
                              type: string
                            domainId:
                              type: string
                          required:
                            - domainNamespaceId
                            - domainId
                      pagination:
                        type: object
                        properties:
                          total:
                            type: number
                          limit:
                            type: number
                          offset:
                            type: number
                        required:
                          - total
                          - limit
                          - offset
                    required:
                      - domainNamespaces
                      - pagination
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/logs/action:
    get:
      description: Query the action audit log for an organization
      tags:
        - Logs
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: true
          name: orgId
          in: path
        - schema:
            type: string
            format: date-time
            description: Start time as ISO date string (defaults to 7 days ago)
          required: false
          description: Start time as ISO date string (defaults to 7 days ago)
          name: timeStart
          in: query
        - schema:
            type: string
            format: date-time
            description: End time as ISO date string (defaults to current time)
          required: false
          description: End time as ISO date string (defaults to current time)
          name: timeEnd
          in: query
        - schema:
            type: string
          required: false
          name: action
          in: query
        - schema:
            type: string
          required: false
          name: actorType
          in: query
        - schema:
            type: string
          required: false
          name: actorId
          in: query
        - schema:
            type: string
          required: false
          name: actor
          in: query
        - schema:
            type: string
            default: '1000'
          required: false
          name: limit
          in: query
        - schema:
            type: string
            default: '0'
          required: false
          name: offset
          in: query
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
                  - error
                  - message
                  - status
  /org/{orgId}/logs/request:
    get:
      description: Query the request audit log for an organization
      tags:
        - Logs
      security:
        - Bearer Auth: []
      parameters:
        - schema:
            type: string
          required: true
          name: orgId
          in: path
        - schema:
            type: string
            format: date-time
            description: Start time as ISO date string (defaults to 7 days ago)
          required: false
          description: Start time as ISO date string (defaults to 7 days ago)
          name: timeStart
          in: query
        - schema:
            type: string
            format: date-time
            description: End time as ISO date string (defaults to current time)
          required: false
          description: End time as ISO date string (defaults to current time)
          name: timeEnd
          in: query
        - schema:
            anyOf:
              - type: boolean
              - type: string
          required: false
          name: action
          in: query
        - schema:
            type: string
            enum:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
          required: false
          name: method
          in: query
        - schema:
            type: string
          required: false
          name: reason
          in: query
        - schema:
            type: string
          required: false
          name: resourceId
          in: query
        - schema:
            type: string
          required: false
          name: actor
          in: query
        - schema:
            type: string
          required: false
          name: location
          in: query
        - schema:
            type: string
          required: false
          name: host
          in: query
        - schema:
            type: string
          required: false
          name: path
          in: query
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                  success:
                    type: boolean
                  error:
                    type: boolean
                  message:
                    type: string
                  status:
                    type: number
                required:
                  - data
                  - success
