
services:
  portainer-prod-5:
    image: portainer/portainer-ce
    container_name: portainer-prod-5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - 9001:9000
      - 8001:8001
      - 9444:9443
    networks:
      - proxy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/AppData/portainer-prod-5/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer-prod-5.entrypoints=http"
      - "traefik.http.routers.portainer-prod-5.rule=Host(`portainer-prod-5.local.kaneworld.org`)"
      - "traefik.http.middlewares.portainer-prod-5-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.portainer-prod-5.middlewares=portainer-prod-5-https-redirect"
      - "traefik.http.routers.portainer-prod-5-secure.entrypoints=https"
      - "traefik.http.routers.portainer-prod-5-secure.rule=Host(`portainer-prod-5.local.kaneworld.org`)"
      - "traefik.http.routers.portainer-prod-5-secure.tls=true"
      - "traefik.http.routers.portainer-prod-5-secure.service=portainer-prod-5"
      - "traefik.http.services.portainer-prod-5.loadbalancer.server.port=9000"
      # # # for authentik
      # - "traefik.http.routers.portainer-prod-5-callback.rule=Host(`portainer-prod-5.local.kaneworld.org`) && PathPrefix(`/oauth2/callback`)"
      # - "traefik.http.routers.portainer-prod-5-callback.entrypoints=https"
      # - "traefik.http.routers.portainer-prod-5-callback.tls=true"
      # #- "traefik.http.routers.portainer-prod-5-callback.tls.certresolver=myresolver"
      # - "traefik.http.services.portainer-prod-5-callback.loadbalancer.server.port=9000" 
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
