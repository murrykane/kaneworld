
services:

  qbittorrent-prod-2:
    image: ghcr.io/binhex/arch-qbittorrentvpn:latest
    container_name: qbittorrent-prod-2
    privileged: true
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - ./qbittorrent/config:/config
      - /mnt/user/data:/data
    networks:
      - proxy  # LAN / Traefik access
      - pia    # VPN traffic network
    ports:
      - '6881:6881'   # Torrent TCP
      - '8080:8080'   # webUI
      - '8118:8118'   # Privoxy HTTP
      - '9118:9118'   # Privoxy HTTPS
      - '58946:58946'
      - '58946:58946/udp' # Torrent UDP
    environment:
      - ENABLE_HEALTHCHECK=true
      - HEALTHCHECK_ACTION=
      - HEALTHCHECK_HOSTNAME=google.com
      - HEALTHCHECK_COMMAND=
      #- HOME=/home/nobody
      - HOST_CONTAINERNAME=qbittorrent-prod-2
      - HOST_HOSTNAME=KaneServer
      - HOST_OS=Unraid
      - LANG=en_GB.UTF-8
      #- PATH=/usr/local/bin/system/scripts/docker:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - SOCKS_USER=admin
      - SOCKS_PASS=socks
      - TERM=xterm
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Los_Angeles
      # VPN settings
      - VPN_ENABLED=yes
      - VPN_USER=${VPN_USER}
      - VPN_PASS=${VPN_PASS}
      - VPN_PROV=pia
      - VPN_CLIENT=wireguard 
      - VPN_OPTIONS=
      - ENABLE_STARTUP_SCRIPTS=no
      - ENABLE_PRIVOXY=yes
      - STRICT_PORT_FORWARD=yes  # enforce VPN for torrents
      - USERSPACE_WIREGUARD=no
      - DOCKER_MODS=binhex/arch-qbittorrentvpn:mod-lan
      - ENABLE_SOCKS=no
      #- LAN_NETWORK=192.168.1.0/24,172.19.0.0/16
      - LAN_NETWORK=192.168.1.0/24,100.0.0.0/8    # need 100 for tailscale on my local windows machine
      #- NAME_SERVERS=84.200.69.80,37.235.1.174,1.1.1.1,37.235.1.177,84.200.70.40,1.0.0.1,192.168.1.215,192.168.1.219,192.168.1.4
      - NAME_SERVERS=84.200.69.80,37.235.1.174,1.1.1.1,37.235.1.177,84.200.70.40,1.0.0.1
      - VPN_INPUT_PORTS=
      - VPN_OUTPUT_PORTS=
      - DEBUG=true
      - WEBUI_PORT=8080
      - UMASK=000
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/binhex/docker-templates/master/binhex/images/qbittorrent-icon.png"
      - "net.unraid.docker.webui=http://[IP]:[PORT:8080]"
      - "net.unraid.docker.shell=/bin/bash"
      - "net.unraid.docker.logs=/var/log"               # optional, Unraid logs tab
      - "net.unraid.docker.description=Qbittorrent media management" # optional description
      - "net.unraid.docker.startup=true"                # tells UI it's a template container
      - "net.unraid.docker.category=Media"             # optional category grouping
      - "net.unraid.docker.template=true"              # marks it as template-aware
      - "net.unraid.docker.terminal=true"              # enables /logterminal access
      - "net.unraid.docker.restart=unless-stopped"     # ensures restart policy
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent-prod-2.entrypoints=http"
      - "traefik.http.routers.qbittorrent-prod-2.rule=Host(`qbittorrent-prod-2.local.kaneworld.org`)"
      - "traefik.http.middlewares.qbittorrent-prod-2-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}"
      - "traefik.http.middlewares.qbittorrent-prod-2-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.qbittorrent-prod-2.middlewares=qbittorrent-prod-2-https-redirect"
      - "traefik.http.routers.qbittorrent-prod-2-secure.entrypoints=https"
      - "traefik.http.routers.qbittorrent-prod-2-secure.rule=Host(`qbittorrent-prod-2.local.kaneworld.org`)"
      - "traefik.http.routers.qbittorrent-prod-2-secure.tls=true"
      #for authentik auth
      - "traefik.http.routers.qbittorrent-prod-2-secure.middlewares=auth-forwardauth@file"
      - "traefik.http.routers.qbittorrent-prod-2-secure.service=qbittorrent-prod-2"
      - "traefik.http.services.qbittorrent-prod-2.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"
    cap_add:
      - NET_ADMIN  # Required for VPN connections
      - SYS_MODULE  # required for wireguard client
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/config/scripts/qbit_healthcheck.bash"]
      interval: 20s
      timeout: 10s
      start_period: 30s

