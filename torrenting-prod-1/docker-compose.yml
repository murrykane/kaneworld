      - /mnt/user/data:/data
    networks:
      - proxy
    ports:
      - 7476:7476
    depends_on:
      - qbittorrent-prod-2
    restart: unless-stopped

  krusader-prod-2:
    image: ghcr.io/binhex/arch-krusader:latest
    # tty: true
    # stdin_open: true
    #user: ${PUID}:${PGID}
    container_name: krusader-prod-2
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Los_Angeles
      - TEMP_FOLDER=/config/temp
      - UMASK=002
      - VNC_PASSWORD=${VNC_PASSWORD}
      #- VNC_PASSWORD=    # putting NO password and using authentic NOTE: it wouldn't work with empty password
    labels:
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/binhex/docker-templates/master/binhex/images/krusader-icon.png"
      - "net.unraid.docker.webui=http://[IP]:[PORT:6080]"
      - "net.unraid.docker.shell=/bin/bash"
      - "net.unraid.docker.logs=/var/log"               # optional, Unraid logs tab
      - "net.unraid.docker.description=Krusader media management" # optional description
      - "net.unraid.docker.startup=true"                # tells UI it's a template container
      - "net.unraid.docker.category=Media"             # optional category grouping
      - "net.unraid.docker.template=true"              # marks it as template-aware
      - "net.unraid.docker.terminal=true"              # enables /logterminal access
      - "net.unraid.docker.restart=unless-stopped"     # ensures restart policy
      #############   this worked from dockerhand..... ####################################################
      # - "traefik.enable=true"
      # - "traefik.http.routers.krusader-prod-2-secure.rule=Host(`krusader-prod-2.local.kaneworld.org`)"
      # - "traefik.http.routers.krusader-prod-2-secure.entrypoints=https"
      # - "traefik.http.routers.krusader-prod-2-secure.tls=true"
      # - "traefik.http.routers.krusader-prod-2-secure.middlewares=auth-forwardauth@file"
      # - "traefik.http.routers.krusader-prod-2-secure.service=krusader-prod-2"
      # - "traefik.http.services.krusader-prod-2.loadbalancer.server.port=6080"
      #############   this worked from dockerhand..... ####################################################
      - "traefik.enable=true"
      - "traefik.http.routers.krusader-prod-2.entrypoints=http"
      - "traefik.http.routers.krusader-prod-2.rule=Host(`krusader-prod-2.local.kaneworld.org`)"
      - "traefik.http.middlewares.krusader-prod-2-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}"
      - "traefik.http.middlewares.krusader-prod-2-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.krusader-prod-2.middlewares=krusader-prod-2-https-redirect"
      - "traefik.http.routers.krusader-prod-2-secure.entrypoints=https"
      - "traefik.http.routers.krusader-prod-2-secure.rule=Host(`krusader-prod-2.local.kaneworld.org`)"
      - "traefik.http.routers.krusader-prod-2-secure.tls=true"
      # Authentik login....
      - "traefik.http.routers.krusader-prod-2-secure.middlewares=auth-forwardauth@file"
      - "traefik.http.routers.krusader-prod-2-secure.service=krusader-prod-2"
      - "traefik.http.services.krusader-prod-2.loadbalancer.server.port=6080"
      - "traefik.docker.network=proxy"
    volumes:
      - ./krusader/config:/config
      - /mnt/user/data:/data
    networks:
      - proxy
    ports:
      - 5900:5900  # You can change the port if needed
      - 6080:6080
    # depends_on:
    #   - qbittorrent-prod-2
    #   - sonarr-prod-2
    #   - radarr-prod-2
    #   - prowlarr-prod-2
    restart: unless-stopped

  recyclarr-prod-2:
    image: ghcr.io/recyclarr/recyclarr:latest
    # tty: true
    # stdin_open: true
    container_name: recyclarr-prod-2
    #user: ${PUID}:${PGID}
    networks:
      - proxy
    volumes:
      - ./recyclarr/config:/config
    environment:
      - TZ=America/Los_Angeles
      - PUID=${PUID}
      - PGID=${PGID}
    depends_on:
      - sonarr-prod-2
      - radarr-prod-2
    restart: unless-stopped
    labels:                    
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/recyclarr/recyclarr/master/ci/notify/trash-icon.png"
      - "net.unraid.docker.shell=/bin/bash"
      - "net.unraid.docker.logs=/var/log"               # optional, Unraid logs tab
      - "net.unraid.docker.description=Recyclarr media management" # optional description
      - "net.unraid.docker.startup=true"                # tells UI it's a template container
      - "net.unraid.docker.category=Media"             # optional category grouping
      - "net.unraid.docker.template=true"              # marks it as template-aware
      - "net.unraid.docker.terminal=true"              # enables /logterminal access
      - "net.unraid.docker.restart=unless-stopped"     # ensures restart policy

networks:
  pia:
    external: true
  proxy:
    external: true