<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Blocked</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: rgba(0,0,0,0.45);
      padding: 2.5rem;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.4);
      max-width: 520px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 2.2rem;
    }
    .reason {
      margin: 1rem 0;
      opacity: 0.9;
    }
    .node {
      margin-top: 1.5rem;
      font-family: monospace;
      background: rgba(255,255,255,0.1);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      display: inline-block;
    }
    footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚫 Access Blocked</h1>
    <p class="reason">
      Your request was denied by our security system.
      This usually happens due to suspicious or abusive behavior.
    </p>

    <div class="node">
      Blocked by: <strong id="blocked-by">crowdsec-prod-3</strong>
    </div>

    <footer>
      CrowdSec Protection · Your IP has been temporarily restricted
    </footer>
  </div>

  <script>
    const blockedBy = new URLSearchParams(window.location.search).get('blocked_by');
    if (blockedBy) {
      document.getElementById('blocked-by').textContent = blockedBy;
    }
  </script>
</body>
</html>
