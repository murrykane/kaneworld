services:
  homepage-prod-1:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage-prod-1
    env_file:
      - ./.env
    # uncomment if you do not want to run as root
    user: 1000:1000
    # uncomment if you are not using a reverse proxy
    ports:
     - 3001:3000
    environment:
      TZ: 'America/Los_Angeles'
      HOMEPAGE_ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    volumes:
      - /home/murry/containers/homepage-prod-1/config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock # (optional) For docker integrations
      - /opt/repos/homelab/certs:/app/config/certs    # to get certs from the github repo pushed to local disk  
      #- /home/murry/containers/traefik/data:/app/data/docker-tls
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage-prod-1.entrypoints=http"
      - "traefik.http.routers.homepage-prod-1.rule=Host(`homepage-prod-1.local.kaneworld.org`)"
      - "traefik.http.routers.homepage-prod-1.middlewares=default-whitelist@file"
      - "traefik.http.middlewares.homepage-prod-1-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.homepage-prod-1.middlewares=homepage-prod-1-https-redirect"
      - "traefik.http.routers.homepage-prod-1-secure.entrypoints=https"
      - "traefik.http.routers.homepage-prod-1-secure.rule=Host(`homepage-prod-1.local.kaneworld.org`)"
      - "traefik.http.routers.homepage-prod-1-secure.tls=true"
      - "traefik.http.routers.homepage-prod-1-secure.service=homepage-prod-1"
      - "traefik.http.services.homepage-prod-1.loadbalancer.server.port=3000"
    security_opt:
      - no-new-privileges:true

networks:
  proxy:
    external: true