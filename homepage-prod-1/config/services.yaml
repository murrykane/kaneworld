#
    - Unraid CleanupArr:
        icon: cleanuparr.png
        href: "{{HOMEPAGE_VAR_UNRAID_CLEANARR_URL}}"
        description: Finding Content
        siteMonitor: "{{HOMEPAGE_VAR_UNRAID_CLEANARR_URL}}"
        ping: "{{HOMEPAGE_VAR_UNRAID_CLEANARR_URL}}"
        statusStyle: "basic"
        hideErrors: true
        showStats: true
        server: unraid-docker
        container: cleanuparr-prod-1
        widget:
            type: customapi
            url: "{{HOMEPAGE_VAR_UNRAID_CLEANARR_API_URL}}"
            headers:
                X-Api-Key: "{{HOMEPAGE_VAR_UNRAID_CLEANARR_API_KEY}}"
            mappings:
                - field: events.totalCount
                  label: Events (24h)
                  format: number
                - field: strikes.totalCount
                  label: Strikes (24h)
                  format: number
                - field: strikes.itemsRemoved
                  label: Removed
                  format: number
