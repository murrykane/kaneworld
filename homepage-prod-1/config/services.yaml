    - Unraid Houndarr:
        icon: https://raw.githubusercontent.com/av1155/houndarr/main/src/houndarr/static/img/houndarr-logo-dark.png
        href: "{{HOMEPAGE_VAR_HOUNDARR_URL}}"
        description: Houndarr on Unraid to find Media Content
        siteMonitor: "{{HOMEPAGE_VAR_HOUNDARR_URL}}"
        ping: "{{HOMEPAGE_VAR_HOUNDARR_URL}}"
        statusStyle: "basic"
        hideErrors: true
        showStats: true
        server: unraid-docker
        container: houndarr-prod-1
        widget:
          type: customapi
          url: "{{HOMEPAGE_VAR_HOUNDARR_API_URL}}"
          method: GET
          refreshInterval: 30000
          headers:
            X-Api-Key: "{{HOMEPAGE_VAR_HOUNDARR_API_KEY}}"
          mappings:
            - { field: totals.eligible, label: Eligible, format: number }
            - { field: totals.gated, label: Gated, format: number }
            - { field: totals.unreleased, label: Unreleased, format: number }
            - { field: totals.searches_7d, label: Searches, format: number }
