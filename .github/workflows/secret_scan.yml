name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gitleaks:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore

      - name: Notify Discord on leak
        if: steps.gitleaks.outcome == 'failure'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -e

          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          ACTOR="${GITHUB_ACTOR}"
          SHA="${GITHUB_SHA}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          PAYLOAD=$(cat <<EOF
          {
            "username": "Gitleaks Scanner",
            "embeds": [
              {
                "title": "🚨 Potential secret detected",
                "color": 15158332,
                "fields": [
                  { "name": "Repository", "value": "${REPO}", "inline": true },
                  { "name": "Branch", "value": "${BRANCH}", "inline": true },
                  { "name": "Author", "value": "${ACTOR}", "inline": true },
                  { "name": "Commit", "value": "${SHA}", "inline": false },
                  { "name": "Run", "value": "${RUN_URL}", "inline": false }
                ]
              }
            ]
          }
          EOF
          )

          curl -sSf -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${DISCORD_WEBHOOK_URL}"

      - name: Fail job if secrets were found
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected potential secrets. See the uploaded report artifact and Discord alert."
          exit 1

  gitleaks-full-scan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks against entire repo history
        id: gitleaks
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            zricethezav/gitleaks:latest \
            detect --source=/repo --report-format=sarif --report-path=/repo/results-full.sarif --verbose --exit-code 1
        continue-on-error: true

      - name: Upload full-scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-full-report
          path: results-full.sarif
          if-no-files-found: ignore

      - name: Notify Discord on leak
        if: steps.gitleaks.outcome == 'failure'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -e

          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          ACTOR="${GITHUB_ACTOR}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          PAYLOAD=$(cat <<EOF
          {
            "username": "Gitleaks Scanner",
            "embeds": [
              {
                "title": "🚨 Secrets found in full repo scan",
                "color": 15158332,
                "fields": [
                  { "name": "Repository", "value": "${REPO}", "inline": true },
                  { "name": "Branch", "value": "${BRANCH}", "inline": true },
                  { "name": "Triggered by", "value": "${ACTOR}", "inline": true },
                  { "name": "Run", "value": "${RUN_URL}", "inline": false }
                ]
              }
            ]
          }
          EOF
          )

          curl -sSf -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${DISCORD_WEBHOOK_URL}"

      - name: Fail job if secrets were found
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks found secrets in the full repo scan. See the uploaded report artifact and Discord alert."
          exit 1
