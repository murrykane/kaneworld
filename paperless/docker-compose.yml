  #   #   # Force CPU usage
  #   #   OLLAMA_DEVICE: cpu
  #   #   OLLAMA_MAX_LOADED_MODELS: 1
  #   #   OLLAMA_NUM_PARALLEL: 1


  # paperless-ai service
  paperless-ai:
    image: clusterzx/paperless-ai:latest
    container_name: paperless-ai-prod-1
    restart: unless-stopped
    depends_on:
      - ollama
      - paperless
    ports:
      - "3000:3000"
    env_file:
      - ./paperless-ai/.env
    volumes:
      - ./paperless-ai/data:/app/data
    networks:
      - proxy
      - paperless
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_PAPAI}.entrypoints=${TRAEFIK_PROTOCOL_HTTP}"
      - "traefik.http.routers.${TRAEFIK_PAPAI}.rule=Host(`${TRAEFIK_DOMAIN_PAPAI}`)"
      - "traefik.http.middlewares.${TRAEFIK_PAPAI}-https-redirect.redirectscheme.scheme=${TRAEFIK_PROTOCOL_HTTPS}"
      - "traefik.http.routers.${TRAEFIK_PAPAI}.middlewares=${TRAEFIK_PAPAI}-https-redirect"
      - "traefik.http.routers.${TRAEFIK_PAPAI}-secure.entrypoints=${TRAEFIK_PROTOCOL_HTTPS}"
      - "traefik.http.routers.${TRAEFIK_PAPAI}-secure.rule=Host(`${TRAEFIK_DOMAIN_PAPAI}`)"
      - "traefik.http.routers.${TRAEFIK_PAPAI}-secure.tls=true"
      - "traefik.http.routers.${TRAEFIK_PAPAI}-secure.service=${TRAEFIK_PAPAI}"
      - "traefik.http.services.${TRAEFIK_PAPAI}.loadbalancer.server.port=${TRAEFIK_UI_PORT_PAPAI}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"  

  # paperless-gpt service
  paperless-gpt:
    image: icereed/paperless-gpt:latest
    container_name: paperless-gpt-prod-1
    restart: unless-stopped
    depends_on:
      - ollama
      - paperless
    ports:
      - "3002:8080"
    env_file:
      - ./paperless-gpt/.env
    volumes:
      - ./paperless-gpt/prompts:/app/prompts
    networks:
      - proxy
      - paperless
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}.entrypoints=${TRAEFIK_PROTOCOL_HTTP}"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}.rule=Host(`${TRAEFIK_DOMAIN_PAPGBT}`)"
      - "traefik.http.middlewares.${TRAEFIK_PAPGBT}-https-redirect.redirectscheme.scheme=${TRAEFIK_PROTOCOL_HTTPS}"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}.middlewares=${TRAEFIK_PAPGBT}-https-redirect"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}-secure.entrypoints=${TRAEFIK_PROTOCOL_HTTPS}"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}-secure.rule=Host(`${TRAEFIK_DOMAIN_PAPGBT}`)"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}-secure.tls=true"
      - "traefik.http.routers.${TRAEFIK_PAPGBT}-secure.service=${TRAEFIK_PAPGBT}"
      - "traefik.http.services.${TRAEFIK_PAPGBT}.loadbalancer.server.port=${TRAEFIK_UI_PORT_PAPGBT}"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

networks:
  paperless:
  proxy:
    external: true