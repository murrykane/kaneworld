  middlewares:

    pihole2-redirect:
      redirectRegex:
        regex: "^https?://pihole2.local.kaneworld.org/$"
        replacement: "https://pihole2.local.kaneworld.org/admin/"

    pihole3-redirect:
      redirectRegex:
        regex: "^https?://pihole3.local.kaneworld.org/$"
        replacement: "https://pihole3.local.kaneworld.org/admin/"

    pihole4-redirect:
      redirectRegex:
        regex: "^https?://pihole4.local.kaneworld.org/$"
        replacement: "https://pihole4.local.kaneworld.org/admin/"

    qvr-redirect:
      redirectRegex:
        regex: "^https?://qvr.local.kaneworld.org/$"
        replacement: "https://qvr.local.kaneworld.org/qvrpro/"

    # nextcloud-redirect:
    #   redirectRegex:
    #     regex: "^https://(.*)/.well-known/(?:card|cal)dav"
    #     replacement: "https://${1}/remote.php/dav"

    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true

    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    hahome-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
          X-Forwarded-For: ""

    authentik-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
          Authorization: Authorization

    # https://github.com/goauthentik/authentik/issues/2366
    authentik:
      forwardAuth:
        #address: https://authentik.local.kaneworld.org/outpost.goauthentik.io/auth/traefik
        address: http://authentik.kane.mk:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

