#endregion
  middlewares:

    crowdsec-bouncer:
      forwardAuth:
        address: http://bouncer-traefik-prod-1:8080/api/v1/forwardAuth
        trustForwardHeader: true
        maxResponseBodySize: 1048576
        
    strip-outpost-prefix:
      stripPrefix:
        prefixes:
          - "/outpost.goauthentik.io"

    qvr-redirect:
      redirectRegex:
        regex: "^https?://qvr.local.kaneworld.org/$"
        replacement: "https://qvr.local.kaneworld.org/qvrpro/"

    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true


    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    hahome-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
          X-Forwarded-For: ""

    auth-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https
          #Authorization: Authorization   #this was over-writting the header with a hard-coded value 'Authorization' it should have been "" to keep existing value

    auth-forwardauth:
      forwardAuth:
        address: http://mkserver-outpost:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        maxResponseBodySize: 1048576
        addAuthCookiesToResponse:
          - Set-Cookie
        authRequestHeaders:
          - Accept
          - Cookie
          - Authorization
          - X-Forwarded-For
          - X-Forwarded-Host
          - X-Forwarded-Proto
          - X-Forwarded-Uri
          - X-Real-Ip
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
        tls:
          insecureSkipVerify: true

    arr-auth:
      basicAuth:
        users: 
          #- murrykane:$2y$05$trLBroLGwwcOYlwWGVKAbO1hapv4T2lohokUUm7sWRgQ8EuU8lts2
          - MurryKane:$2y$05$F5mvJX83Oy1kcfcw7QXkh.KsZxHBkvqfVxsasUjT/CsDqsBRbQfQi
          #- "murrykane:$$apr1$$JPVGUIAR$$StwhpMevdRSoTS9/OiyFE1"
          #- MurryKane:$$2y$$05$$SXcy5cOp3Jbk80MN/UuKI.fEOyWn31g/MVVCBCn9grJt/YqE9Qyay
        #usersFile: "/etc/traefik/auth/auth.txt"

    default-whitelist:
      ipAllowList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/24"
        - "172.19.0.0/16"
        - "172.17.0.0/16"
        - "172.25.0.0/16"
        - "172.23.0.0/16"
        - "172.24.0.0/16"
        - "172.22.0.0/16"
        - "172.20.0.0/16"

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers