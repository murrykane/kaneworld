# =============================================================================
# pg_hba.conf — Host-Based Authentication
# Centralized multi-app PostgreSQL 16 instance
# Proxmox + Ceph RBD
#
# FORMAT:
#   TYPE    DATABASE        USER            ADDRESS                 METHOD
#
# TYPE:
#   local   = Unix socket (same host)
#   host    = TCP/IP (plain or SSL)
#   hostssl = TCP/IP (SSL required)
#   hostnossl = TCP/IP (SSL explicitly rejected)
#
# METHOD:
#   scram-sha-256  = modern secure password auth (matches password_encryption in postgres.conf)
#   reject         = explicitly deny the connection
# =============================================================================


# -----------------------------------------------------------------------------
# LOCAL — Unix socket connections (container internal / admin use)
# Allows the postgres superuser to connect locally without a password.
# Used by pg_isready in the healthcheck and by admin CLI work.
# -----------------------------------------------------------------------------
local   all             postgres                                scram-sha-256
local   all             all                                     scram-sha-256


# -----------------------------------------------------------------------------
# SUPERUSER / ADMIN — restrict to localhost only
# Never allow the superuser to connect from the network.
# -----------------------------------------------------------------------------
host    all             postgres        127.0.0.1/32            scram-sha-256
host    all             postgres        ::1/128                 scram-sha-256
host    all             postgres        0.0.0.0/0               reject


# -----------------------------------------------------------------------------
# APP CONNECTIONS — each app gets access only to its own database
#
# TODO: Replace 172.20.0.0/16 with your actual Docker bridge subnet
#       (set in docker-compose.yml as 172.20.0.0/16).
#       If apps connect from a different VM over LAN, use that subnet instead
#       e.g. 192.168.1.0/24
#
# Each line grants a specific user access to only their own database.
# Using 'all' in the DATABASE column is intentionally avoided — least privilege.
#
#   broader approach
#     172.16.0.0/12 covers the entire 172.16.x.x → 172.31.x.x range, which encompasses 
#     all standard Docker bridge subnets and is still private RFC1918 space — 
#     nothing on the internet routes to it.
#
# -----------------------------------------------------------------------------

# authentik
host    authentik       authentik       172.16.0.0/12          scram-sha-256

# Linkwarden
host    linkwarden      linkwarden      172.16.0.0/12           scram-sha-256

# Dockhand
host    dockhand        dockhand        172.16.0.0/12           scram-sha-256

# n8n
host    n8n             n8n             172.16.0.0/12           scram-sha-256

# Scanopy
host    scanopy         scanopy         172.16.0.0/12           scram-sha-256

# Immich
host    immich          immich          172.16.0.0/12           scram-sha-256

# Paperless
host    paperless       paperless       172.16.0.0/12           scram-sha-256

# Semaphore (migrated from MySQL)
host    semaphore       semaphore       172.16.0.0/12           scram-sha-256

# infisical 
host    infisical       infisical       172.16.0.0/12           scram-sha-256

# for private lan access
host    linkwarden      linkwarden      192.168.1.0/24          scram-sha-256
host    dockhand        dockhand        192.168.1.0/24          scram-sha-256
host    n8n             n8n             192.168.1.0/24          scram-sha-256
host    scanopy         scanopy         192.168.1.0/24          scram-sha-256
host    immich          immich          192.168.1.0/24          scram-sha-256
host    paperless       paperless       192.168.1.0/24          scram-sha-256
host    semaphore       semaphore       192.168.1.0/24          scram-sha-256
host    authentik       authentik       192.168.1.0/24          scram-sha-256
host    infisical       infisical       192.168.1.0/24          scram-sha-256

# -----------------------------------------------------------------------------
# FALLBACK — deny everything else not explicitly matched above
# PostgreSQL evaluates rules top-to-bottom and stops at first match.
# This final rule catches any connection not matched by a rule above.
# -----------------------------------------------------------------------------
host    all             all             0.0.0.0/0               reject
host    all             all             ::1/128                 reject