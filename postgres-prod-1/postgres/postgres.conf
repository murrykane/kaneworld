# =============================================================================
# PostgreSQL 16 — Centralized multi-app config
# Ceph RBD-backed VM on Proxmox
# =============================================================================

# -----------------------------------------------------------------------------
# Connection settings
# -----------------------------------------------------------------------------
# TODO: replace with your VM's actual LAN IP (or 'localhost,192.168.x.x')
# Using '*' is acceptable when pg_hba.conf enforces per-app auth, but
# locking to a specific interface is preferred.
listen_addresses = '*'
port = 5432
max_connections = 300              # raised from 200 — 6+ apps with connection pools

# -----------------------------------------------------------------------------
# Memory settings
# Tuned for a 8GB VM. Adjust shared_buffers / effective_cache_size
# if your VM has more or less RAM:
#   shared_buffers        = ~25% of total VM RAM
#   effective_cache_size  = ~75% of total VM RAM
# -----------------------------------------------------------------------------
shared_buffers = 2GB               # raised from 1GB (assumes 8GB VM)
effective_cache_size = 6GB         # raised from 4GB to reflect 75% of 8GB VM RAM
work_mem = 16MB                    # raised from 4MB — better for vector queries (Immich) and multi-app concurrency
maintenance_work_mem = 512MB       # raised from 128MB — speeds up pgvector index builds and VACUUM

# -----------------------------------------------------------------------------
# Parallelism
# Enables parallel query execution across multiple apps
# -----------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# -----------------------------------------------------------------------------
# WAL settings
# -----------------------------------------------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
wal_compression = on               # reduces I/O on Ceph RBD
min_wal_size = 512MB
max_wal_size = 2GB

# -----------------------------------------------------------------------------
# Performance
# Tuned for Ceph RBD (SSD-class block storage)
# -----------------------------------------------------------------------------
random_page_cost = 1.1             # correct for SSD/Ceph — do not raise
effective_io_concurrency = 200     # correct for SSD-class storage
huge_pages = try                   # use huge pages if OS supports them; fails silently if not

# -----------------------------------------------------------------------------
# Extensions (preloaded at startup)
# pg_stat_statements: identifies slow queries across all apps — essential
# for a shared multi-app instance
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000

# -----------------------------------------------------------------------------
# Logging
# Slow query logging is also set via docker-compose command flags;
# these settings control the collector behavior itself.
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off            # Docker captures stderr directly — collector not needed
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000  # log queries taking >= 1 second (also set in compose command)

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
ssl = off                          # acceptable for private LAN/Docker-only traffic
                                   # enable and mount certs if any app crosses an untrusted network
password_encryption = scram-sha-256