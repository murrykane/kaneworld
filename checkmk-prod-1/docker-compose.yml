---
services:
  checkmk-prod-1:
    image: checkmk/check-mk-raw:${version:?2.4.0}-latest
    #image: checkmk/check-mk-raw:2.4.0b6
    #image: checkmk/check-mk-raw:2.4.0p3
    container_name: checkmk-prod-1
    ports:
      - "8005:8000"
      - "5000:5000"
      - "162:162/udp"
    environment:
      #- TZ=America/Los_Angeles
      - CMK_PASSWORD=${CMK_PASSWORD:?no password set}
      - CMK_SITE_ID=${CMK_SITE_ID:-cmk}
      - CMK_SKIP_START_SITE=${CMK_SKIP_START_SITE:-yes}
      - CMK_SITE=${CMD_SITE_ID:-cmk}
    tmpfs:
      - /opt/omd/sites/cmk/tmp:uid=${uid:?1000},gid=${gid:?1000}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      #- .data:/omd/sites:rw
      - ./data:/omd/sites:rw
      - ./backups:/backups
      - ./resolv.conf:/etc/resolv.conf
      #- ./data/KaneCo:/omd/sites/KaneCo
      #- ./checkmk-entrypoint.sh:/usr/local/bin/checkmk-entrypoint.sh
    # dns:
    #   - 192.168.1.49
    #   - 192.168.1.3
    #   - 192.168.1.1
    #   - 8.8.8.8
    # dns_search:
    #   - kane.mk
    networks:
      - proxy
    # labels:
      # - traefik.enable=true
      # - traefik.http.services.checkmk.loadbalancer.server.port=5000
      # - traefik.http.services.checkmk.loadbalancer.server.scheme=http
      # - traefik.http.routers.checkmk.service=checkmk
      # - traefik.http.routers.checkmk.rule=Host(`checkmk.home.arpa`)
      # - traefik.http.routers.checkmk.entrypoints=websecure
      # - traefik.http.routers.checkmk.tls=true
      # - traefik.http.routers.checkmk.tls.certresolver=cloudflare
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.checkmk.entrypoints=http"
      - "traefik.http.routers.checkmk.rule=Host(`checkmk.local.kaneworld.org`)"
      - "traefik.http.middlewares.checkmk-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.checkmk.middlewares=checkmk-https-redirect"
      - "traefik.http.routers.checkmk-secure.entrypoints=https"
      - "traefik.http.routers.checkmk-secure.rule=Host(`checkmk.local.kaneworld.org`)"
      - "traefik.http.routers.checkmk-secure.tls=true"
      - "traefik.http.routers.checkmk-secure.service=checkmk"
      - "traefik.http.services.checkmk.loadbalancer.server.port=5000"
      - "traefik.docker.network=proxy"
    restart: unless-stopped
    #entrypoint: ["/usr/local/bin/checkmk-entrypoint.sh"]
    #command: [ "tail", "-f", "/dev/null" ]
    healthcheck:
      test: ["CMD-SHELL", "omd status || exit 1"]
      interval: 5m
      timeout: 45s
      retries: 5
      start_period: 2m

volumes:
  data:
    driver: local

networks:
  proxy:
    external: true