---
services:
    it-tools-prod-1:
        image: 'corentinth/it-tools:latest'
        ports:
            - '8087:80'
        restart: unless-stopped
        container_name: it-tools-prod-1
        networks:
          - proxy
        labels:
          - "traefik.enable=true"
          - "traefik.docker.network=proxy"
          - "traefik.http.routers.it-tools.entrypoints=http"
          - "traefik.http.routers.it-tools.rule=Host(`it-tools.local.kaneworld.org`)"
          - "traefik.http.middlewares.it-tools-https-redirect.redirectscheme.scheme=https"
          - "traefik.http.routers.it-tools.middlewares=it-tools-https-redirect"
          - "traefik.http.routers.it-tools-secure.entrypoints=https"
          - "traefik.http.routers.it-tools-secure.rule=Host(`it-tools.local.kaneworld.org`)"
          - "traefik.http.routers.it-tools-secure.tls=true"
          - "traefik.http.routers.it-tools-secure.middlewares=auth-forwardauth@file"   #authentik login required
          - "traefik.http.routers.it-tools-secure.service=it-tools"
          - "traefik.http.services.it-tools.loadbalancer.server.port=80"
networks:
  proxy:
    external: true