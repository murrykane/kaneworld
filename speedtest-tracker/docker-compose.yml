---
services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-prod-1
    dns: 
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - DB_CONNECTION=sqlite
      - APP_KEY=${APP_KEY}
      - SPEEDTEST_SCHEDULE='*/15 * * * *'
      #- SPEEDTEST_SCHEDULE='*/30 * * * *'
      #- SPEEDTEST_SCHEDULE='*/5 * * * *'
      #- SPEEDTEST_EXTERNAL_IP_URL=https://api.ipify.org/
      - SPEEDTEST_EXTERNAL_IP_URL=https://ifconfig.me
      - DISPLAY_TIMEZONE=America/Los_Angeles
      - SPEEDTEST_SERVERS=9436,67659,1783,62680,64119
      - APP_URL=https://speedtest.local.kaneworld.org
      #- APP_TIMEZONE=America/Los_Angeles
      # - DB_HOST= #optional
      # - DB_PORT= #optional
      # - DB_DATABASE= #optional
      # - DB_USERNAME= #optional
      # - DB_PASSWORD= #optional
    volumes:
      - /home/murry/containers/speedtest-tracker/data:/config
    ports:
      - 86:80
    restart: unless-stopped

    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.speedtest.entrypoints=http"
      - "traefik.http.routers.speedtest.rule=Host(`speedtest.local.kaneworld.org`)"
      - "traefik.http.routers.speedtest.middlewares=default-whitelist@file"
      - "traefik.http.middlewares.speedtest-https-redirect.redirectscheme.scheme=https"  
      - "traefik.http.routers.speedtest.middlewares=speedtest-https-redirect"
      - "traefik.http.routers.speedtest-secure.entrypoints=https"
      - "traefik.http.routers.speedtest-secure.rule=Host(`speedtest.local.kaneworld.org`)"
      - "traefik.http.routers.speedtest-secure.tls=true"
      - "traefik.http.routers.speedtest-secure.service=speedtest"
      - "traefik.http.services.speedtest.loadbalancer.server.port=80"
networks:
  proxy:
    external: true