#version: '3'
# make sure ${HOME}/containers/traefik/acme.json   is root owned and 600 permissions
# 
# secrets:
#   cf-token:
#     file: /mnt/cache/traefik-prod-5/cf-token
services:
  traefik-prod-5:
    image: traefik:latest # or traefik:v3.3 to pin a version
    container_name: traefik-prod-5
    restart: unless-stopped
    user: "${UID-0}:${GID-0}"
    security_opt:
      - no-new-privileges:true # helps to increase security
    # secrets:
    #   - cf-token # the secret at the top of this file
    # env_file:
    #   - .env # store other secrets e.g., dashboard password
    networks:
       proxy:
       #bridge:
    ports:
      - 80:80
      - 443:443
      - 8899:8899
     # - 10000:10000 # optional
     # - 33073:33073 # optional
    environment:
      - TRAEFIK_DASHBOARD_CREDENTIALS=${TRAEFIK_DASHBOARD_CREDENTIALS}
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      # - CF_API_EMAIL=your@email.com # Cloudflare email
      # - CF_DNS_API_TOKEN=YOUR-TOKEN # Cloudflare API Token
      # - CF_DNS_API_TOKEN_FILE=/run/secrets/cf-token # see https://doc.traefik.io/traefik/https/acme/#providers
      # token file is the proper way to do it
      - TRAEFIK_NODE_NAME=${TRAEFIK_NODE_NAME}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/AppData/traefik-prod-5/data/traefik.yml:/traefik.yml:ro
      - /mnt/user/AppData/traefik-prod-5/data/acme.json:/acme.json
      - /mnt/user/AppData/traefik-prod-5/data/config.yml:/config.yml:ro
      #- /mnt/user/AppData/traefik-prod-5/logs:/var/log/traefik
      - /mnt/user/AppData/traefik-prod-5/cf-token:/run/secrets/cf-token:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-prod-5.entrypoints=http"
      - "traefik.http.routers.traefik-prod-5.rule=Host(`traefik-prod-5.local.kaneworld.org`)"
      - "traefik.http.middlewares.traefik-prod-5-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}"
      - "traefik.http.middlewares.traefik-prod-5-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.traefik-prod-5.middlewares=traefik-prod-5-https-redirect"
      - "traefik.http.routers.traefik-prod-5-secure.entrypoints=https"
      - "traefik.http.routers.traefik-prod-5-secure.rule=Host(`traefik-prod-5.local.kaneworld.org`)"
      - "traefik.http.routers.traefik-prod-5-secure.middlewares=traefik-prod-5-auth"
      - "traefik.http.routers.traefik-prod-5-secure.tls=true"
      #for authentik auth
      - "traefik.http.routers.traefik-prod-5-secure.middlewares=auth-forwardauth@file"
      - "traefik.http.routers.traefik-prod-5-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-prod-5-secure.tls.domains[0].main=local.kaneworld.org"
      - "traefik.http.routers.traefik-prod-5-secure.tls.domains[0].sans=*.local.kaneworld.org"
      - "traefik.http.routers.traefik-prod-5-secure.service=api@internal"
      # Unauthenticated API-only route for Homepage widget
      - "traefik.http.routers.traefik-api.rule=Host(`traefik5-widget.local.kaneworld.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.traefik-api.entrypoints=https"
      - "traefik.http.routers.traefik-api.service=api@internal"
      - "traefik.http.routers.traefik-api.tls.certresolver=cloudflare"
      # for metrics
      - "traefik.http.routers.traefik-metrics.rule=Host(`traefik5-metrics.local.kaneworld.org`) && Path(`/metrics`)"
      #- "traefik.http.routers.traefik-metrics.entrypoints=metrics"  #over tls with certificate...... so switched to 443/https
      - "traefik.http.routers.traefik-metrics.entrypoints=https"
      - "traefik.http.routers.traefik-metrics.tls=true"
      - "traefik.http.routers.traefik-metrics.service=prometheus@internal"

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec-prod-5
    environment:
      GID: "${GID-0}"
      UID: "${UID-0}"
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/traefik"
    volumes:
      - /mnt/user/AppData/traefik-prod-5/acquis:/etc/crowdsec/acquis.d
      - crowdsec-db:/var/lib/crowdsec/data/
      - ./config/config.yaml.local:/etc/crowdsec/config.yaml.local:ro  # replaces old mount
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 8081:8080 # expose Local API
      - 6060:6060 # expose prometheus metrics
    networks:
      - proxy
    depends_on:
      - traefik-prod-5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cscli", "version"]
    security_opt:
      - no-new-privileges:true
      
  bouncer-traefik5:
    image: docker.io/fbonalair/traefik-crowdsec-bouncer:latest
    container_name: bouncer-traefik-prod-5
    environment:
      BOUNCER_FAILURE_MODE: "${BOUNCER_FAILURE_MODE-open}"
      CROWDSEC_BOUNCER_API_KEY: "${CROWDSEC_BOUNCER5_API_KEY}"
      CROWDSEC_AGENT_HOST: "${CROWDSEC_AGENT_HOST-crowdsec-prod-5:8080}"
      TRAEFIK_URL: "${TRAEFIK5_URL}"
      TRAEFIK_USER: "${TRAEFIK5_USER}"
      TRAEFIK_PASSWORD: "${TRAEFIK5_PASSWORD}"
      TRAEFIK_SKIP_TLS_VERIFY: true
    networks:
      - proxy # same network as traefik + crowdsec
    depends_on:
      - crowdsec
    restart: unless-stopped

networks:
  proxy:
    external: true # or comment this line to auto create the network

volumes:
   crowdsec-db:
   #crowdsec-config: