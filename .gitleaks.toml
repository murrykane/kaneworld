title = "kaneworld gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "generic-dotenv-file"
description = "Any .env style file"
regex = '''(?i)^.*\.env(\..*)?$'''
path = '''(^|/)\.env(\..*)?$'''

[[rules]]
id = "generic-pub-file"
description = "Any .pub style file"
regex = '''(?i)^.*\.pub$'''
path = '''(^|/)\.pub$'''

[[rules]]
id = "cf-secret-file"
description = "Cloudflare secret / token file"
regex = '''(?i)cf[_-]?secret'''
path = '''(?i)cf[_-]?secret'''

[[rules]]
id = "apprise-discord-webhook-url"
description = "Apprise-style discord://webhook_id/webhook_token URL (default rules only catch key:value or discord.com/api/webhooks/... shapes, not this)"
regex = '''discord://\d{15,20}/[A-Za-z0-9_-]{60,90}'''

[[rules]]
id = "apprise-discord-webhook-url-mailrise"
description = "Apprise-style http.*discord.com/ URL (default rules only catch key:value or discord.com/api/webhooks/... shapes, not this)"
regex = '''http.*discord.*/\d{15,20}/[A-Za-z0-9_-]{60,90}'''

[[rules]]
id = "gotify-webhook-url-mailrise"
description = "Gotify-style gotifys://gotify.* URL (default rules only catch key:value or discord.com/api/webhooks/... shapes, not this)"
regex = '''gotifys://gotify.*/[a-zA-Z0-9]{12,20}'''

[[rules]]
id = "yaml-base64-secret"
description = "secret/token/password/key-style value in any YAML file, base64-encoded (base64 chars / and + truncate the default generic-api-key regex match)"
regex = '''(?i)(?:secret|token|password|passwd|pwd|api[_-]?key|client[_-]?secret|access[_-]?key|private[_-]?key|auth[_-]?token)\s*:\s*["']?[A-Za-z0-9+/]{20,}={0,2}["']?'''
path = '''\.ya?ml$'''

[[rules]]
id = "wireguard-config-or-backup"
description = "WireGuard config/backup - contains PrivateKey by nature, flagged on presence not content pattern"
path = '''(^|/)wg\d*\.conf([._-]?(backup|bak|save|old|orig))?$'''
regex = '''(?s).+'''

[[rules]]
id = "traefik-acme-storage"
description = "Traefik ACME storage (acme.json) - contains account + cert private keys, flagged on presence not content pattern"
path = '''(^|/)acme\.json([._-]?(backup|bak|save|old|orig))?$'''
regex = '''(?s).+'''

[allowlist]
description = "Paths gitleaks should never scan"
paths = [
  '''\.git/''',
]
